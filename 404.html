<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Ultimate Downloads</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: #fff; text-align: center; }
        .container { max-width: 500px; }
        .error-code { font-size: 120px; font-weight: 900; background: linear-gradient(135deg, #7ac142, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .error-icon { font-size: 60px; color: #7ac142; margin: 20px 0; }
        h1 { font-size: 28px; margin-bottom: 12px; }
        p { color: #aaa; margin-bottom: 30px; font-size: 15px; line-height: 1.6; }
        .home-btn { display: inline-flex; align-items: center; gap: 8px; background: #7ac142; color: #fff; padding: 14px 30px; border-radius: 30px; text-decoration: none; font-weight: 700; transition: 0.2s; }
        .home-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(122,193,66,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="error-icon"><i class="fa-solid fa-ghost"></i></div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back home.</p>
        <a href="/" class="home-btn"><i class="fa-solid fa-house"></i> Back to Home</a>
    </div>
</body>
</html>
