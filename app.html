<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #1a1a1a; color: #fff; }
        .app-hero-bg {
            position: relative;
            height: 280px;
            background-size: cover;
            background-position: center;
            background-color: #2a2a2a;
        }
        .app-hero-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(26,26,26,0.95) 100%);
        }
        .app-hero-bg .app-title-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 2;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }
        .app-hero-bg h1 {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        .app-hero-bg .hero-icon-small {
            width: 60px; height: 60px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .breadcrumb-dark { background: #1a1a1a; padding: 12px 20px; font-size: 13px; }
        .breadcrumb-dark a { color: #7ac142; font-weight: 600; }
        .breadcrumb-dark .current { color: #ff7a3d; font-weight: 600; }
        .app-info-section { padding: 20px; }
        .app-main-row { display: flex; gap: 15px; margin-bottom: 15px; align-items: flex-start; }
        .app-main-icon { width: 100px; height: 100px; border-radius: 18px; background: #2a2a2a; object-fit: cover; flex-shrink: 0; }
        .app-main-details h1 { font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 6px; color: #fff; }
        .app-developer { color: #7ac142; font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        .app-badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; color: #fff; }
        .badge-editor { background: #ff7a3d; }
        .badge-paid { background: #7ac142; }
        .badge-free { background: #3498db; }
        .mod-tag { color: #ff7a3d; font-size: 14px; font-weight: 600; margin: 20px 0 10px; }
        .app-description { color: #ccc; font-size: 14px; line-height: 1.7; font-style: italic; margin-bottom: 25px; }
        .app-stats-row { display: flex; justify-content: space-around; align-items: center; padding: 15px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; margin-bottom: 25px; }
        .stat-block { text-align: center; }
        .stat-block .stat-val { font-size: 17px; font-weight: 800; color: #fff; }
        .stat-block .stat-lbl { font-size: 11px; color: #888; margin-top: 3px; text-transform: uppercase; }
        .play-stat { display: flex; align-items: center; gap: 5px; }
        .play-stat img { height: 24px; }
        .rating-stat { color: #ff7a3d !important; }
        .download-btn-big {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #7ac142, #5a9d2e);
            color: #fff; border: none; border-radius: 30px;
            font-size: 17px; font-weight: 700; cursor: pointer;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(122,193,66,0.4);
        }
        .action-row { display: flex; justify-content: center; gap: 30px; margin-top: 20px; padding: 15px 0; }
        .action-btn { color: #7ac142; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; text-decoration: none; }
        .action-btn.orange { color: #ff7a3d; }
        .info-section-dark { background: #222; padding: 20px; margin-top: 10px; }
        .info-section-dark h3 { font-size: 16px; color: #fff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .info-section-dark h3 i { color: #ff7a3d; }
        .info-section-dark p { color: #bbb; font-size: 14px; line-height: 1.7; }
        .screenshots-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .screenshots-scroll::-webkit-scrollbar { display: none; }
        .screenshots-scroll img { height: 280px; border-radius: 12px; }
        .related-list { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .related-list::-webkit-scrollbar { display: none; }
        .related-item { min-width: 100px; text-align: center; cursor: pointer; }
        .related-item img { width: 80px; height: 80px; border-radius: 18px; object-fit: cover; }
        .related-item h4 { font-size: 12px; font-weight: 700; margin-top: 8px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 80px; }
        .not-found { text-align: center; padding: 60px 20px; color: #fff; }
        .not-found i { font-size: 60px; color: #555; margin-bottom: 15px; }
        .top-header { background: #1a1a1a !important; }
        .logo { color: #7ac142 !important; }
        .search-icon { color: #fff !important; }
        .menu-icon span { background: #fff !important; }
        .bottom-nav { background: #1a1a1a !important; }
        .nav-item { color: #888 !important; }
        .nav-item.active { color: #7ac142 !important; }
    </style>
</head>
<body>

<header class="top-header">
    <div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <a href="/" class="logo">ULTIMATE<span>DOWNLOADS</span></a>
    <div class="search-icon" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></div>
</header>

<div class="search-box" id="searchBox">
    <input type="text" placeholder="Search apps and games..." id="globalSearch">
    <div class="search-results" id="searchResults"></div>
</div>

<div class="side-menu" id="sideMenu">
    <a href="/"><i class="fa-solid fa-house"></i> Home</a>
    <a href="/apps.html"><i class="fa-solid fa-mobile-screen"></i> Apps</a>
    <a href="/games.html"><i class="fa-solid fa-gamepad"></i> Games</a>
    <a href="/news.html"><i class="fa-solid fa-fire"></i> News</a>
    <a href="/browse.html"><i class="fa-solid fa-skull"></i> Browse</a>
</div>

<div id="appContent"><div class="not-found"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading...</p></div></div>

<nav class="bottom-nav">
    <a href="/" class="nav-item"><i class="fa-solid fa-house nav-icon"></i><span class="nav-label">Home</span></a>
    <a href="/apps.html" class="nav-item"><i class="fa-solid fa-mobile-screen nav-icon"></i><span class="nav-label">Apps</span></a>
    <a href="/games.html" class="nav-item"><i class="fa-solid fa-gamepad nav-icon"></i><span class="nav-label">Games</span></a>
    <a href="/news.html" class="nav-item"><i class="fa-solid fa-fire nav-icon"></i><span class="nav-label">News</span></a>
    <a href="/browse.html" class="nav-item"><i class="fa-solid fa-skull nav-icon"></i><span class="nav-label">Browse</span></a>
</nav>

<script src="/js/main.js"></script>
<script>
function formatNum(n) {
    n = parseInt(n) || 0;
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return n;
}

async function loadAppDetail() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const container = document.getElementById('appContent');
    if (!id) { container.innerHTML = '<div class="not-found"><i class="fa-solid fa-circle-exclamation"></i><h2>No App Selected</h2></div>'; return; }
    try {
        const res = await fetch('/api/apps');
        const data = await res.json();
        const app = data.apps.find(a => a.id === id);
        if (!app) { container.innerHTML = '<div class="not-found"><i class="fa-solid fa-circle-exclamation"></i><h2>App Not Found</h2></div>'; return; }
        document.title = `${app.name} - Ultimate Downloads`;
        const related = data.apps.filter(a => a.id !== app.id && a.category === app.category).slice(0, 8);
        const screenshots = app.screenshots ? app.screenshots.split(',').map(s => s.trim()).filter(s => s) : [];
        const bgImage = app.background || app.icon;
        container.innerHTML = `
            <div class="app-hero-bg" style="background-image: url('${bgImage}');">
                <div class="app-title-overlay">
                    <h1>${app.name}</h1>
                    <img src="${app.icon}" class="hero-icon-small" onerror="this.style.display='none'">
                </div>
            </div>
            
            <div class="breadcrumb-dark">
                <a href="/">Home</a> › <a href="/${app.type === 'game' ? 'games' : 'apps'}.html">${app.type === 'game' ? 'Games' : 'Apps'}</a> › <a href="#">${app.category}</a> › <span class="current">${app.name.toUpperCase()}</span>
            </div>
            
            <div class="app-info-section">
                <div class="app-main-row">
                    <img src="${app.icon}" class="app-main-icon" onerror="this.src='https://via.placeholder.com/100/333/7ac142?text=APP'">
                    <div class="app-main-details">
                        <h1>${app.name}${app.version ? ' v' + app.version : ''} ${app.type === 'game' ? 'APK' : 'APK'}${app.modInfo ? ' (MOD, ' + (app.modInfo.split(',')[0] || 'Premium') + ')' : ''}</h1>
                        ${app.developer ? `<div class="app-developer">${app.developer}</div>` : ''}
                        <div class="app-badges">
                            ${app.editorChoice ? '<span class="badge badge-editor">Editor\\'s Choice</span>' : ''}
                            ${app.paid ? '<span class="badge badge-paid">Paid</span>' : '<span class="badge badge-free">Free</span>'}
                        </div>
                    </div>
                </div>
                
                ${app.modInfo ? `<div class="mod-tag">MOD: ${app.modInfo}</div>` : ''}
                
                <div class="app-description">${app.description || 'No description available.'}</div>
                
                <div class="app-stats-row">
                    <div class="stat-block">
                        <div class="stat-val">${app.version || '1.0'}</div>
                        <div class="stat-lbl">Version</div>
                    </div>
                    <div class="stat-block">
                        <div class="stat-val">${app.size || 'N/A'}</div>
                        <div class="stat-lbl">Size</div>
                    </div>
                    <div class="stat-block">
                        <div class="stat-val play-stat">
                            ${app.playUrl ? `<a href="${app.playUrl}" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Google_Play_Store_badge_EN.svg/2560px-Google_Play_Store_badge_EN.svg.png" style="height:20px;"></a>` : '<i class="fa-brands fa-google-play" style="color:#7ac142;"></i>'}
                        </div>
                        <div class="stat-lbl">Get it on</div>
                    </div>
                    <div class="stat-block">
                        <div class="stat-val rating-stat">${app.rating || '4.0'} ★</div>
                        <div class="stat-lbl">${formatNum(app.ratingsCount) || '0'} ratings</div>
                    </div>
                </div>
                
                <a href="${app.download}" class="download-btn-big" download onclick="trackDownload('${app.id}')">
                    <i class="fa-solid fa-download"></i> Download APK
                </a>
                
                <div class="action-row">
                    <a href="javascript:void(0)" onclick="shareApp('${app.name}')" class="action-btn">
                        <i class="fa-solid fa-share-nodes"></i> Share
                    </a>
                    <a href="javascript:void(0)" class="action-btn orange">
                        <i class="fa-solid fa-rotate"></i> Request Update
                    </a>
                </div>
            </div>
            
            ${screenshots.length > 0 ? `
                <div class="info-section-dark">
                    <h3><i class="fa-solid fa-images"></i> Screenshots</h3>
                    <div class="screenshots-scroll">
                        ${screenshots.map(s => `<img src="${s}" onerror="this.style.display='none'">`).join('')}
                    </div>
                </div>
            ` : ''}
            
            <div class="info-section-dark">
                <h3><i class="fa-solid fa-shield-halved"></i> Safety</h3>
                <p>✅ Scanned & Verified Safe<br>✅ Free Download<br>✅ No Hidden Cost</p>
            </div>
            
            ${related.length > 0 ? `
                <div class="info-section-dark">
                    <h3><i class="fa-solid fa-thumbs-up"></i> You May Also Like</h3>
                    <div class="related-list">
                        ${related.map(r => `
                            <div class="related-item" onclick="window.location.href='/app.html?id=${r.id}'">
                                <img src="${r.icon}" onerror="this.src='https://via.placeholder.com/80/333/7ac142?text=A'">
                                <h4>${r.name}</h4>
                            </div>
                        `).join('')}
                    </div>
                </div>
            ` : ''}
        `;
    } catch (error) {
        container.innerHTML = '<div class="not-found"><i class="fa-solid fa-triangle-exclamation"></i><h2>Failed to load</h2></div>';
    }
}

async function trackDownload(id) {
    try { await fetch('/api/download', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) }); } catch (e) {}
}

function shareApp(name) {
    if (navigator.share) {
        navigator.share({ title: name, url: window.location.href });
    } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copied!');
    }
}

loadAppDetail();
</script>

</body>
</html>
