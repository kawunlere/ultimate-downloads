<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Apps - Ultimate Downloads</title>
<script src="https://quge5.com/88/tag.min.js" data-zone="244467" async data-cfasync="false"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .breadcrumb {
            background: #fff;
            padding: 12px 20px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
        }
        .breadcrumb a { color: #7ac142; font-weight: 600; }
        .breadcrumb .current { color: #ff7a3d; font-weight: 600; }
        
        .page-header {
            background: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-header h1 {
            font-size: 20px;
            font-weight: 800;
        }
        
        .page-header .count {
            color: #888;
            font-size: 14px;
            font-weight: 500;
        }
        
        .sort-dropdown {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            outline: none;
        }
        
        .category-filter {
            background: #fff;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .category-filter::-webkit-scrollbar { display: none; }
        
        .filter-chip {
            padding: 8px 18px;
            border: 1px solid #ddd;
            border-radius: 25px;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .filter-chip.active {
            background: #7ac142;
            color: #fff;
            border-color: #7ac142;
        }
        
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
        }
        
        .grid-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        
        .grid-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }
        
        .grid-card img {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 10px;
            background: #f0f0f0;
        }
        
        .grid-card h3 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .grid-card p {
            font-size: 12px;
            color: #888;
        }
        
        @media (min-width: 768px) {
            .apps-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

<header class="top-header">
    <div class="menu-icon" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
    <a href="/" class="logo">ULTIMATE<span>DOWNLOADS</span></a>
    <div class="search-icon" onclick="toggleSearch()">
        <i class="fa-solid fa-magnifying-glass"></i>
    </div>
</header>

<div class="search-box" id="searchBox">
    <input type="text" placeholder="Search apps..." id="searchInput">
</div>

<div class="side-menu" id="sideMenu">
    <a href="/"><i class="fa-solid fa-house"></i> Home</a>
    <a href="/apps.html"><i class="fa-solid fa-mobile-screen"></i> Apps</a>
    <a href="/games.html"><i class="fa-solid fa-gamepad"></i> Games</a>
    <a href="/news.html"><i class="fa-solid fa-fire"></i> News</a>
    <a href="/browse.html"><i class="fa-solid fa-skull"></i> Browse</a>
</div>

<div class="breadcrumb">
    <a href="/">Home</a> › <span class="current">Apps</span>
</div>

<div class="page-header">
    <div>
        <h1>Apps <span class="count" id="appCount">(0)</span></h1>
    </div>
    <select class="sort-dropdown" id="sortBy" onchange="renderApps()">
        <option value="newest">Newest</option>
        <option value="name">Name</option>
        <option value="rating">Rating</option>
    </select>
</div>

<div class="category-filter" id="categoryFilter">
    <div class="filter-chip active" onclick="filterByCategory('all', this)">All</div>
</div>

<div class="apps-grid" id="appsGrid">
    <div class="loading" style="grid-column: 1/-1;">Loading apps...</div>
</div>

<nav class="bottom-nav">
    <a href="/" class="nav-item">
        <i class="fa-solid fa-house nav-icon"></i>
        <span class="nav-label">Home</span>
    </a>
    <a href="/apps.html" class="nav-item active">
        <i class="fa-solid fa-mobile-screen nav-icon"></i>
        <span class="nav-label">Apps</span>
    </a>
    <a href="/games.html" class="nav-item">
        <i class="fa-solid fa-gamepad nav-icon"></i>
        <span class="nav-label">Games</span>
    </a>
    <a href="/news.html" class="nav-item">
        <i class="fa-solid fa-fire nav-icon"></i>
        <span class="nav-label">News</span>
    </a>
    <a href="/browse.html" class="nav-item">
        <i class="fa-solid fa-skull nav-icon"></i>
        <span class="nav-label">Browse</span>
    </a>
</nav>

<script src="/js/main.js"></script>
<script>
let allApps = [];
let currentCategory = 'all';
let currentSearch = '';

async function loadAllApps() {
    try {
        const response = await fetch('/api/apps');
        const data = await response.json();
        allApps = (data.apps || []).filter(a => a.type === 'app');
        
        document.getElementById('appCount').textContent = `(${allApps.length})`;
        buildCategoryFilter();
        renderApps();
    } catch (error) {
        document.getElementById('appsGrid').innerHTML = '<div class="loading" style="grid-column: 1/-1;">Failed to load apps</div>';
    }
}

function buildCategoryFilter() {
    const categories = [...new Set(allApps.map(a => a.category))];
    const container = document.getElementById('categoryFilter');
    container.innerHTML = '<div class="filter-chip active" onclick="filterByCategory(\'all\', this)">All</div>';
    categories.forEach(cat => {
        const chip = document.createElement('div');
        chip.className = 'filter-chip';
        chip.textContent = cat;
        chip.onclick = () => filterByCategory(cat, chip);
        container.appendChild(chip);
    });
}

function filterByCategory(cat, element) {
    currentCategory = cat;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    renderApps();
}

function renderApps() {
    let filtered = allApps;
    
    if (currentCategory !== 'all') {
        filtered = filtered.filter(a => a.category === currentCategory);
    }
    
    if (currentSearch) {
        filtered = filtered.filter(a => 
            a.name.toLowerCase().includes(currentSearch.toLowerCase())
        );
    }
    
    const sortBy = document.getElementById('sortBy').value;
    if (sortBy === 'name') {
        filtered.sort((a, b) => a.name.localeCompare(b.name));
    } else if (sortBy === 'rating') {
        filtered.sort((a, b) => parseFloat(b.rating || 0) - parseFloat(a.rating || 0));
    } else {
        filtered.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    }
    
    const grid = document.getElementById('appsGrid');
    if (filtered.length === 0) {
        grid.innerHTML = '<div class="loading" style="grid-column: 1/-1;">No apps found</div>';
        return;
    }
    
    grid.innerHTML = filtered.map(app => `
        <div class="grid-card" onclick="openApp('${app.id}')">
            <img src="${app.icon}" alt="${app.name}" onerror="this.src='https://via.placeholder.com/70/7ac142/ffffff?text=APP'">
            <h3>${app.name}</h3>
            <p>${app.category}</p>
        </div>
    `).join('');
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderApps();
});

loadAllApps();
</script>

</body>
</html>
