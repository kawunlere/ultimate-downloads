<html lang="en">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #1a1a1a !important; color: #fff !important; }
        .top-header { background: #1a1a1a !important; border-bottom: 1px solid #333; }
        .menu-icon span { background: #fff !important; }
        .search-icon { color: #fff !important; }
        .bottom-nav { background: #1a1a1a !important; }
        .nav-item { color: #888 !important; }
        .nav-item.active { color: #7ac142 !important; }
        .breadcrumb { background: #1a1a1a; padding: 12px 20px; font-size: 14px; border-bottom: 1px solid #333; color: #fff; }
        .breadcrumb a { color: #7ac142; font-weight: 600; }
        .breadcrumb .current { color: #ff7a3d; font-weight: 600; }
        .page-header { background: #1a1a1a; padding: 20px; }
        .page-header h1 { font-size: 22px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 10px; }
        .page-header h1 i { color: #ff7a3d; }
        .page-header p { color: #888; font-size: 13px; margin-top: 5px; }
        .section-tabs { background: #1a1a1a; display: flex; border-bottom: 1px solid #333; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 14px; font-weight: 600; color: #888; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: #7ac142; border-bottom-color: #7ac142; }
        .categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .category-box { background: #2a2a2a; border-radius: 15px; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
        .category-box:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .category-box .icon-wrap { width: 60px; height: 60px; border-radius: 18px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 26px; }
        .category-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 5px; color: #fff; }
        .category-box .count { font-size: 12px; color: #aaa; }
        @media (min-width: 768px) { .categories-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

<header class="top-header">
    <div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <a href="/" class="logo">ULTIMATE<span>DOWNLOADS</span></a>
    <div class="search-icon" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></div>
</header>

<div class="search-box" id="searchBox">
    <input type="text" placeholder="Search categories...">
</div>

<div class="side-menu" id="sideMenu">
    <a href="/"><i class="fa-solid fa-house"></i> Home</a>
    <a href="/apps.html"><i class="fa-solid fa-mobile-screen"></i> Apps</a>
    <a href="/games.html"><i class="fa-solid fa-gamepad"></i> Games</a>
    <a href="/news.html"><i class="fa-solid fa-fire"></i> News</a>
    <a href="/browse.html"><i class="fa-solid fa-skull"></i> Browse</a>
</div>

<div class="breadcrumb">
    <a href="/">Home</a> &rsaquo; <span class="current">Browse</span>
</div>

<div class="page-header">
    <h1><i class="fa-solid fa-compass"></i> Browse Categories</h1>
    <p>Find apps and games by category</p>
</div>

<div class="section-tabs">
    <div class="tab active" onclick="switchTab('apps', this)">Apps</div>
    <div class="tab" onclick="switchTab('games', this)">Games</div>
</div>

<div class="categories-grid" id="categoriesGrid">
    <div class="loading" style="grid-column: 1/-1; color: #888;">Loading categories...</div>
</div>

<nav class="bottom-nav">
    <a href="/" class="nav-item"><i class="fa-solid fa-house nav-icon"></i><span class="nav-label">Home</span></a>
    <a href="/apps.html" class="nav-item"><i class="fa-solid fa-mobile-screen nav-icon"></i><span class="nav-label">Apps</span></a>
    <a href="/games.html" class="nav-item"><i class="fa-solid fa-gamepad nav-icon"></i><span class="nav-label">Games</span></a>
    <a href="/news.html" class="nav-item"><i class="fa-solid fa-fire nav-icon"></i><span class="nav-label">News</span></a>
    <a href="/browse.html" class="nav-item active"><i class="fa-solid fa-skull nav-icon"></i><span class="nav-label">Browse</span></a>
</nav>

<script src="/js/main.js"></script>
<script>
let allItems = [];
let currentTab = 'apps';

const categoryColors = ['linear-gradient(135deg, #ff6b6b, #ee5a6f)','linear-gradient(135deg, #7ac142, #4a7c1f)','linear-gradient(135deg, #3498db, #2980b9)','linear-gradient(135deg, #9b59b6, #8e44ad)','linear-gradient(135deg, #ff7a3d, #e65100)','linear-gradient(135deg, #1abc9c, #16a085)','linear-gradient(135deg, #f39c12, #d35400)','linear-gradient(135deg, #34495e, #2c3e50)'];

const categoryIcons = {'Social':'fa-users','Music':'fa-music','Music & Audio':'fa-music','Video Players & Editors':'fa-video','Photography':'fa-camera','Tools':'fa-screwdriver-wrench','Action':'fa-bolt','Adventure':'fa-mountain','Racing':'fa-car','Simulation':'fa-plane','Role Playing':'fa-dragon','Arcade':'fa-gamepad','Puzzle':'fa-puzzle-piece','Sports':'fa-football','Strategy':'fa-chess','Communication':'fa-comments','Entertainment':'fa-clapperboard'};

async function loadCategories() {
    try {
        const response = await fetch('/api/apps');
        const data = await response.json();
        allItems = data.apps || [];
        renderCategories();
    } catch (error) {
        document.getElementById('categoriesGrid').innerHTML = '<div class="loading" style="grid-column: 1/-1; color: #888;">Failed to load</div>';
    }
}

function switchTab(tab, element) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    element.classList.add('active');
    renderCategories();
}

function renderCategories() {
    const filtered = allItems.filter(a => a.type === (currentTab === 'apps' ? 'app' : 'game'));
    const categoryMap = {};
    filtered.forEach(item => { if (!categoryMap[item.category]) categoryMap[item.category] = 0; categoryMap[item.category]++; });
    const categories = Object.keys(categoryMap);
    const grid = document.getElementById('categoriesGrid');
    if (categories.length === 0) {
        grid.innerHTML = '<div class="loading" style="grid-column: 1/-1; color: #888;">No categories yet</div>';
        return;
    }
    let html = '';
    categories.forEach((cat, index) => {
        const icon = categoryIcons[cat] || 'fa-folder';
        const color = categoryColors[index % categoryColors.length];
        const link = currentTab === 'apps' ? '/apps.html' : '/games.html';
        html += '<div class="category-box" onclick="window.location.href=\'' + link + '\'">';
        html += '<div class="icon-wrap" style="background: ' + color + ';"><i class="fa-solid ' + icon + '"></i></div>';
        html += '<h3>' + cat + '</h3>';
        html += '<div class="count">' + categoryMap[cat] + ' ' + (currentTab === 'apps' ? 'apps' : 'games') + '</div>';
        html += '</div>';
    });
    grid.innerHTML = html;
}

loadCategories();
</script>

</body>
</html>
