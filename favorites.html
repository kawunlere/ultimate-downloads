<script src="/js/main.js"></script>
<script>
async function loadFavs() {
    const favIds = JSON.parse(localStorage.getItem('favorites') || '[]');
    const list = document.getElementById('favsList');
    if (favIds.length === 0) {
        list.innerHTML = '<div class="empty-favs"><i class="fa-solid fa-heart-crack"></i><h2>No Favorites Yet</h2><p>Click the heart icon on any app to save it here</p></div>';
        return;
    }
    try {
        const res = await fetch('/api/apps');
        const data = await res.json();
        const favs = favIds.map(id => data.apps.find(a => a.id === id)).filter(a => a);
        if (favs.length === 0) {
            list.innerHTML = '<div class="empty-favs"><i class="fa-solid fa-heart-crack"></i><h2>No Favorites</h2></div>';
            return;
        }
        let html = '';
        favs.forEach(app => {
            html += '<div class="fav-item"><img src="' + app.icon + '" onclick="window.location.href=\'/app.html?id=' + app.id + '\'"><div class="info" onclick="window.location.href=\'/app.html?id=' + app.id + '\'"><h3>' + app.name + '</h3><div class="meta">⭐ ' + (app.rating || '4.0') + ' • ' + app.category + '</div></div><button class="remove-btn" onclick="removeFav(\'' + app.id + '\')">Remove</button></div>';
        });
        list.innerHTML = html;
    } catch (e) { list.innerHTML = '<div class="empty-favs">Failed to load</div>'; }
}

function removeFav(id) {
    let favs = JSON.parse(localStorage.getItem('favorites') || '[]');
    favs = favs.filter(f => f !== id);
    localStorage.setItem('favorites', JSON.stringify(favs));
    loadFavs();
}

loadFavs();
</script>
