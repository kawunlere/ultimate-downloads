<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Games - Ultimate Downloads</title>
    <meta name="monetag" content="a982387c3a54fa1381a25c8713ff5adb">
    <script src="https://quge5.com/88/tag.min.js" data-zone="244467" async data-cfasync="false"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #1a1a1a !important; color: #fff !important; }
        .top-header { background: #1a1a1a !important; border-bottom: 1px solid #333; }
        .menu-icon span { background: #fff !important; }
        .search-icon { color: #fff !important; }
        .bottom-nav { background: #1a1a1a !important; }
        .nav-item { color: #888 !important; }
        .nav-item.active { color: #7ac142 !important; }
        .breadcrumb { background: #1a1a1a; padding: 12px 20px; font-size: 14px; border-bottom: 1px solid #333; color: #fff; }
        .breadcrumb a { color: #7ac142; font-weight: 600; }
        .breadcrumb .current { color: #ff7a3d; font-weight: 600; }
        .page-header { background: #1a1a1a; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .page-header h1 { font-size: 22px; font-weight: 800; color: #fff; }
        .page-header .count { color: #888; font-size: 14px; font-weight: 500; }
        .sort-dropdown { padding: 8px 15px; border: 1px solid #444; border-radius: 25px; background: #2a2a2a; color: #fff; font-size: 13px; font-weight: 600; outline: none; }
        .category-filter { background: #1a1a1a; padding: 15px 20px; border-bottom: 1px solid #333; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .category-filter::-webkit-scrollbar { display: none; }
        .filter-chip { padding: 8px 18px; border: 1px solid #444; border-radius: 25px; background: #2a2a2a; font-size: 13px; font-weight: 600; color: #ccc; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .filter-chip.active { background: #7ac142; color: #fff; border-color: #7ac142; }
        .games-bg-grid { padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .game-bg-card { position: relative; height: 220px; border-radius: 15px; overflow: hidden; cursor: pointer; background: #2a2a2a; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.2s; }
        .game-bg-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .game-bg-card .bg-img { position: absolute; inset: 0; background-size: cover; background-position: center; }
        .game-bg-card .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.9) 100%); }
        .game-bg-card .content { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px; z-index: 2; }
        .game-bg-card .content .top-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .game-bg-card .content img { width: 45px; height: 45px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); flex-shrink: 0; }
        .game-bg-card .content h3 { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.2; }
        .game-bg-card .content .meta { font-size: 11px; color: #ccc; display: flex; gap: 6px; align-items: center; }
        .game-bg-card .content .meta .rating { color: #ff7a3d; font-weight: 700; }
        .game-bg-card .content .mod { font-size: 11px; color: #ff7a3d; font-weight: 600; margin-top: 4px; }
        .game-bg-card .top-badges { position: absolute; top: 10px; left: 10px; display: flex; gap: 5px; z-index: 2; }
        .top-badges .mini-badge { padding: 3px 8px; border-radius: 10px; font-size: 9px; font-weight: 700; color: #fff; }
        .mini-editor { background: #ff7a3d; }
        .mini-paid { background: #7ac142; }
        @media (min-width: 768px) { .games-bg-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

<header class="top-header">
    <div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <a href="/" class="logo">ULTIMATE<span>DOWNLOADS</span></a>
    <div class="search-icon" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></div>
</header>

<div class="search-box" id="searchBox">
    <input type="text" placeholder="Search games..." id="searchInput">
</div>

<div class="side-menu" id="sideMenu">
    <a href="/"><i class="fa-solid fa-house"></i> Home</a>
    <a href="/apps.html"><i class="fa-solid fa-mobile-screen"></i> Apps</a>
    <a href="/games.html"><i class="fa-solid fa-gamepad"></i> Games</a>
    <a href="/news.html"><i class="fa-solid fa-fire"></i> News</a>
    <a href="/browse.html"><i class="fa-solid fa-skull"></i> Browse</a>
</div>

<div class="breadcrumb">
    <a href="/">Home</a> &rsaquo; <span class="current">Games</span>
</div>

<div class="page-header">
    <div><h1>Games <span class="count" id="gameCount">(0)</span></h1></div>
    <select class="sort-dropdown" id="sortBy" onchange="renderGames()">
        <option value="newest">Newest</option>
        <option value="name">Name</option>
        <option value="rating">Rating</option>
    </select>
</div>

<div class="category-filter" id="categoryFilter">
    <div class="filter-chip active" onclick="filterByCategory('all', this)">All</div>
</div>

<div class="games-bg-grid" id="gamesList">
    <div class="loading" style="grid-column: 1/-1; color: #888;">Loading games...</div>
</div>

<nav class="bottom-nav">
    <a href="/" class="nav-item"><i class="fa-solid fa-house nav-icon"></i><span class="nav-label">Home</span></a>
    <a href="/apps.html" class="nav-item"><i class="fa-solid fa-mobile-screen nav-icon"></i><span class="nav-label">Apps</span></a>
    <a href="/games.html" class="nav-item active"><i class="fa-solid fa-gamepad nav-icon"></i><span class="nav-label">Games</span></a>
    <a href="/news.html" class="nav-item"><i class="fa-solid fa-fire nav-icon"></i><span class="nav-label">News</span></a>
    <a href="/browse.html" class="nav-item"><i class="fa-solid fa-skull nav-icon"></i><span class="nav-label">Browse</span></a>
</nav>

<script src="/js/main.js"></script>
<script>
let allGames = [];
let currentCategory = 'all';
let currentSearch = '';

async function loadAllGames() {
    try {
        const response = await fetch('/api/apps');
        const data = await response.json();
        allGames = (data.apps || []).filter(a => a.type === 'game');
        document.getElementById('gameCount').textContent = '(' + allGames.length + ')';
        buildCategoryFilter();
        renderGames();
    } catch (error) {
        document.getElementById('gamesList').innerHTML = '<div class="loading" style="grid-column: 1/-1; color: #888;">Failed to load</div>';
    }
}

function buildCategoryFilter() {
    const categories = [...new Set(allGames.map(a => a.category))];
    const container = document.getElementById('categoryFilter');
    container.innerHTML = '<div class="filter-chip active" onclick="filterByCategory(\'all\', this)">All</div>';
    categories.forEach(cat => {
        const chip = document.createElement('div');
        chip.className = 'filter-chip';
        chip.textContent = cat;
        chip.onclick = () => filterByCategory(cat, chip);
        container.appendChild(chip);
    });
}

function filterByCategory(cat, element) {
    currentCategory = cat;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    renderGames();
}

function renderGames() {
    let filtered = allGames;
    if (currentCategory !== 'all') filtered = filtered.filter(a => a.category === currentCategory);
    if (currentSearch) filtered = filtered.filter(a => a.name.toLowerCase().includes(currentSearch.toLowerCase()));
    
    const sortBy = document.getElementById('sortBy').value;
    if (sortBy === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name));
    else if (sortBy === 'rating') filtered.sort((a, b) => parseFloat(b.rating || 0) - parseFloat(a.rating || 0));
    else filtered.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    
    const list = document.getElementById('gamesList');
    if (filtered.length === 0) {
        list.innerHTML = '<div class="loading" style="grid-column: 1/-1; color: #888;">No games found</div>';
        return;
    }
    
    let html = '';
    filtered.forEach(game => {
        const bg = game.background || game.icon;
        let badges = '';
        if (game.editorChoice) badges += '<span class="mini-badge mini-editor">Editor</span>';
        if (game.paid) badges += '<span class="mini-badge mini-paid">Paid</span>';
        
        html += '<div class="game-bg-card" onclick="window.location.href=\'/app.html?id=' + game.id + '\'">';
        html += '<div class="bg-img" style="background-image: url(\'' + bg + '\');"></div>';
        html += '<div class="overlay"></div>';
        if (badges) html += '<div class="top-badges">' + badges + '</div>';
        html += '<div class="content">';
        html += '<div class="top-row"><img src="' + game.icon + '"><div><h3>' + game.name + '</h3></div></div>';
        html += '<div class="meta"><span class="rating">&#9733; ' + (game.rating || '4.0') + '</span> &bull; <span>' + game.category + '</span></div>';
        if (game.modInfo) html += '<div class="mod">' + game.modInfo + '</div>';
        html += '</div></div>';
    });
    list.innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderGames();
});

loadAllGames();
</script>

</body>
</html>
