    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

        body { background: #1a1a1a !important; color: #fff !important; }
        .top-header { background: #1a1a1a !important; border-bottom: 1px solid #333; }
        .menu-icon span { background: #fff !important; }

        .nav-item { color: #888 !important; }
        .nav-item.active { color: #7ac142 !important; }
        .back-btn { position: sticky; top: 55px; background: #1a1a1a; padding: 10px 20px; border-bottom: 1px solid #333; z-index: 50; }
        .back-btn a { color: #7ac142; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .article-banner { height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
        .article-banner i { font-size: 70px; color: rgba(255,255,255,0.3); }
        .article-banner .tag { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.95); color: #ff7a3d; font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 15px; text-transform: uppercase; }
        .article-body { background: #2a2a2a; padding: 25px 20px; }
        .article-body h1 { font-size: 24px; font-weight: 800; line-height: 1.3; margin-bottom: 15px; color: #fff; }
        .article-meta { display: flex; gap: 20px; padding-bottom: 20px; border-bottom: 1px solid #444; margin-bottom: 20px; font-size: 13px; color: #888; }
        .article-meta i { color: #7ac142; margin-right: 4px; }
        .article-content { font-size: 15px; line-height: 1.8; color: #ccc; white-space: pre-wrap; }
        .share-section { background: #2a2a2a; margin-top: 10px; padding: 20px; text-align: center; }
        .share-section h3 { font-size: 14px; color: #888; margin-bottom: 15px; }
        .share-buttons { display: flex; justify-content: center; gap: 12px; }
        .share-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; cursor: pointer; text-decoration: none; }
        .share-whatsapp { background: #25D366; }
        .share-facebook { background: #1877F2; }
        .share-twitter { background: #1DA1F2; }

        .not-found { text-align: center; padding: 60px 20px; color: #fff; }
        .not-found i { font-size: 60px; color: #555; margin-bottom: 15px; }

<body>

<header class="top-header">
    <div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>

<div id="articleContent">
    <div class="loading" style="padding: 50px; color: #888;">Loading article...</div>
</div>

<nav class="bottom-nav">
    <a href="/" class="nav-item"><i class="fa-solid fa-house nav-icon"></i><span class="nav-label">Home</span></a>
    <a href="/apps.html" class="nav-item"><i class="fa-solid fa-mobile-screen nav-icon"></i><span class="nav-label">Apps</span></a>

</nav>

<script src="/js/main.js"></script>
<script>
function formatDate(timestamp) {
    if (!timestamp) return 'Recently';
    const date = new Date(timestamp);
    return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

async function loadArticle() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const container = document.getElementById('articleContent');
    if (!id) { container.innerHTML = '<div class="not-found"><i class="fa-solid fa-circle-exclamation"></i><h2>No Article Selected</h2></div>'; return; }
    try {
        const response = await fetch('/api/news');
        const data = await response.json();
        const article = data.news.find(n => n.id === id);
        if (!article) { container.innerHTML = '<div class="not-found"><i class="fa-solid fa-circle-exclamation"></i><h2>Article Not Found</h2></div>'; return; }
        document.title = article.title + ' - Ultimate Downloads';
        const shareUrl = encodeURIComponent(window.location.href);
        const shareTitle = encodeURIComponent(article.title);
        let html = '';
        html += '<div class="article-banner" style="background: ' + (article.color || 'linear-gradient(135deg, #7ac142, #4a7c1f)') + ';">';
        html += '<i class="fa-solid fa-newspaper"></i><span class="tag">' + (article.tag || 'News') + '</span></div>';
        html += '<div class="article-body"><h1>' + article.title + '</h1>';
        html += '<div class="article-meta"><span><i class="fa-solid fa-user"></i> ' + (article.author || 'Admin') + '</span><span><i class="fa-solid fa-calendar"></i> ' + formatDate(article.createdAt) + '</span></div>';
        html += '<div class="article-content">' + article.content + '</div></div>';
        html += '<div class="share-section"><h3>Share this article</h3><div class="share-buttons">';
        html += '<a href="https://wa.me/?text=' + shareTitle + '%20' + shareUrl + '" target="_blank" class="share-btn share-whatsapp"><i class="fa-brands fa-whatsapp"></i></a>';
        html += '<a href="https://www.facebook.com/sharer/sharer.php?u=' + shareUrl + '" target="_blank" class="share-btn share-facebook"><i class="fa-brands fa-facebook-f"></i></a>';
        html += '<a href="https://twitter.com/intent/tweet?text=' + shareTitle + '&url=' + shareUrl + '" target="_blank" class="share-btn share-twitter"><i class="fa-brands fa-x-twitter"></i></a>';
        html += '<a href="javascript:void(0)" onclick="copyLink()" class="share-btn share-copy"><i class="fa-solid fa-link"></i></a>';
        html += '</div></div>';
        container.innerHTML = html;
    } catch (error) {
        container.innerHTML = '<div class="not-found"><i class="fa-solid fa-triangle-exclamation"></i><h2>Failed to load article</h2></div>';
    }
}

function copyLink() {
    navigator.clipboard.writeText(window.location.href);
    alert('Link copied!');
}

loadArticle();
</script>

</body>
</html>
