<script>
function formatDate(timestamp) {
    if (!timestamp) return 'Recently';
    const date = new Date(timestamp);
    const now = new Date();
    const diff = Math.floor((now - date) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff/60) + ' min ago';
    if (diff < 86400) return Math.floor(diff/3600) + ' hours ago';
    if (diff < 604800) return Math.floor(diff/86400) + ' days ago';
    return date.toLocaleDateString();
}

async function loadNews() {
    try {
        const response = await fetch('/api/news');
        const data = await response.json();
        const news = data.news || [];
        const list = document.getElementById('newsList');
        if (news.length === 0) {
            list.innerHTML = '<div class="loading" style="padding: 50px; color: #888;"><i class="fa-solid fa-newspaper" style="font-size: 50px; color: #444; display: block; margin-bottom: 15px;"></i>No news posted yet</div>';
            return;
        }
        let html = '';
        news.forEach(n => {
            const preview = n.content.length > 120 ? n.content.substring(0, 120) + '...' : n.content;
            html += '<div class="news-card" onclick="window.location.href=\'/news-detail.html?id=' + n.id + '\'">';
            html += '<div class="banner" style="background: ' + (n.color || 'linear-gradient(135deg, #7ac142, #4a7c1f)') + ';"><i class="fa-solid fa-newspaper"></i><span class="tag">' + (n.tag || 'News') + '</span></div>';
            html += '<div class="content"><h3>' + n.title + '</h3><p>' + preview + '</p>';
            html += '<div class="meta"><span><i class="fa-solid fa-user"></i> ' + (n.author || 'Admin') + '</span><span><i class="fa-solid fa-calendar"></i> ' + formatDate(n.createdAt) + '</span></div>';
            html += '</div></div>';
        });
        list.innerHTML = html;
    } catch (error) {
        document.getElementById('newsList').innerHTML = '<div class="loading" style="color: #888;">Failed to load news</div>';
    }
}

loadNews();
</script>
